<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jobby — Drain Controller</title>
  <style>
    :root {
      --bg:         #f6f7fb;
      --card:       #ffffff;
      --border:     #e2e8f0;
      --text:       #0f172a;
      --text-soft:  #475569;
      --text-mute:  #94a3b8;
      --accent:     #4f46e5;
      --accent-2:   #6366f1;
      --success:    #059669;
      --warning:    #d97706;
      --error:      #e11d48;
      --code-bg:    #0f172a;
      --code-text:  #e2e8f0;
      --shadow:     0 1px 2px rgba(15,23,42,.04), 0 4px 12px rgba(15,23,42,.06);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
    header {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 16px; margin-bottom: 24px;
    }
    h1 {
      font-size: 24px; font-weight: 700; letter-spacing: -0.01em;
      margin: 0;
    }
    .subtitle { color: var(--text-soft); font-size: 14px; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: #eef2ff; color: var(--accent);
      padding: 4px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-mute);
      margin: 0 0 14px 0;
    }
    .controls {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .15s, transform .05s;
      font-family: inherit;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary {
      background: var(--accent); color: white;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-2); }
    .btn-secondary {
      background: white; color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: #f8fafc; }
    .btn-danger {
      background: white; color: var(--error);
      border: 1px solid var(--border);
    }
    .btn-danger:hover:not(:disabled) { background: #fff1f3; border-color: var(--error); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    label.field {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--text-soft); font-size: 14px;
    }
    label.field input[type="number"],
    label.field select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: white;
      color: var(--text);
    }
    label.field input[type="number"] { width: 64px; }
    label.field select { min-width: 120px; }
    label.switch {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--text-soft); font-size: 14px;
      cursor: pointer; user-select: none;
    }
    label.switch input { accent-color: var(--accent); transform: scale(1.15); }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .stat {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .stat .k { font-size: 12px; color: var(--text-mute); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat .v { font-size: 22px; font-weight: 700; color: var(--text); margin-top: 2px; }
    .stat .v.success { color: var(--success); }
    .stat .v.error   { color: var(--error); }
    .stat .v.warn    { color: var(--warning); }
    .progress-wrap {
      background: #eef2f7; height: 8px; border-radius: 999px; overflow: hidden;
      margin-top: 14px;
    }
    .progress-bar {
      background: var(--accent); height: 100%; width: 0%;
      transition: width .25s ease;
    }
    .current {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 16px;
      align-items: baseline;
    }
    .current .company {
      font-size: 17px; font-weight: 600; color: var(--text);
    }
    .current .title {
      font-size: 14px; color: var(--text-soft);
    }
    .current .step {
      font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--accent);
      background: #eef2ff; padding: 3px 8px; border-radius: 999px;
      justify-self: end;
    }
    .current .empty { color: var(--text-mute); font-style: italic; }
    .log {
      background: var(--code-bg); color: var(--code-text);
      border-radius: 8px;
      padding: 12px 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12.5px; line-height: 1.55;
      max-height: 360px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-word;
    }
    .log .row { display: grid; grid-template-columns: 78px 88px 1fr; gap: 10px; padding: 1px 0; }
    .log .ts   { color: #64748b; }
    .log .step { font-weight: 600; }
    .log .step.ok      { color: #34d399; }
    .log .step.err     { color: #fb7185; }
    .log .step.info    { color: #c4b5fd; }
    .log .msg   { color: var(--code-text); }
    .log .empty { color: #94a3b8; font-style: italic; padding: 4px 0; }
    .status-line {
      display: flex; align-items: center; gap: 10px;
      margin-top: 4px; font-size: 13px; color: var(--text-soft);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-mute); }
    .dot.running { background: var(--success); animation: pulse 1.4s ease-in-out infinite; }
    .dot.stopped { background: var(--text-mute); }
    .dot.error   { background: var(--error); }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(5,150,105,0.5); }
      50%     { box-shadow: 0 0 0 6px rgba(5,150,105,0); }
    }
    .err-banner {
      display: none; background: #fff1f3; color: #9f1239; border: 1px solid #fecdd3;
      padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; font-size: 14px;
    }
    .err-banner.show { display: block; }
    footer {
      margin-top: 24px; color: var(--text-mute); font-size: 12px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Jobby — Drain Controller</h1>
        <div class="subtitle">In-browser queue runner. Closes when you close this tab.</div>
      </div>
      <span class="pill" id="atsPill">All ATS</span>
    </header>

    <div class="err-banner" id="errBanner"></div>

    <div class="card">
      <h2>Controls</h2>
      <div class="controls">
        <button class="btn btn-primary"   id="startBtn">Start Applying</button>
        <button class="btn btn-danger"    id="stopBtn" disabled>Stop</button>
        <label class="field">
          ATS&nbsp;<select id="atsSelect">
            <option value="all">All</option>
            <option value="greenhouse">Greenhouse</option>
            <option value="ashby">Ashby</option>
            <option value="lever">Lever</option>
          </select>
        </label>
        <label class="field">
          Target&nbsp;<input type="number" id="targetCount" min="1" max="200" value="1" />
        </label>
        <label class="switch">
          <input type="checkbox" id="dryRun" /> Dry-run (fill but don't submit)
        </label>
        <label class="switch">
          <input type="checkbox" id="watchMode" /> Show job tabs (focus each as it opens)
        </label>
        <div class="status-line" style="margin-left:auto;">
          <span class="dot stopped" id="statusDot"></span>
          <span id="statusText">Idle</span>
        </div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <div class="card">
      <h2>Session</h2>
      <div class="stats">
        <div class="stat"><div class="k">Applied</div><div class="v success" id="statApplied">0</div></div>
        <div class="stat"><div class="k">Skipped</div><div class="v warn"    id="statSkipped">0</div></div>
        <div class="stat"><div class="k">Errors</div> <div class="v error"   id="statErrors">0</div></div>
        <div class="stat"><div class="k">Target</div> <div class="v"         id="statTarget">1</div></div>
      </div>
    </div>

    <div class="card">
      <h2>Current Job</h2>
      <div class="current" id="currentJob">
        <div>
          <div class="company empty" id="curCompany">Not running</div>
          <div class="title"        id="curTitle"></div>
        </div>
        <div class="step" id="curStep" style="display:none;">idle</div>
      </div>
    </div>

    <div class="card">
      <h2>Live Log</h2>
      <div class="log" id="log"><div class="empty">No events yet — click Start Applying.</div></div>
    </div>

    <footer>
      Jobby V3 · drain.jsonl on server · close tab to stop
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="cache/profile.js"></script>
  <script src="cache/adapters.js"></script>
  <script src="lib/match.js"></script>
  <script src="lib/resolve.js"></script>
  <script src="drain.js"></script>
</body>
</html>
